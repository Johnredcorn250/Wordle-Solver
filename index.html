  <title>The Solver — Puzzle Assistant</title>
  <meta name="description" content="A 5-letter word puzzle solver built with React." />

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect } = React;

    // ---------- Inline SVG Icons ----------

    // ---------- Word List ----------
    const WORD_STRING = `about above abuse actor acute admit adopt adult after again agent agree ahead alarm album alert alike alive allow alone along alter among anger angle angry apart apple apply arena argue arise armed array arrow aside asset audio audit avoid award aware awful bacon badge badly baker bases basic basis beach began begin begun being below bench berry bible bills birth black blade blame blank blast blaze bleed blend bless blind block blood bloom blown blues blunt board boast bonus boost booth bound brain brake brand brass brave bread break breed brick bride brief bring broad broke brown brush bucket build built bunch burst buyer cabin cable calif cameo camel candy canoe cards cargo carry carve catch cause cease chain chair chaos charm chart chase cheap cheat check chest chief child chill chips choir chose chunk civic civil claim clean clear clerk click cliff climb cling clock clone close cloth cloud clown clubs clues coach coast could count court cover craft crack craft crane crash crazy cream creek crest crime crisp cross crowd crown crude cruel crush crust curse curve cycle daily dairy dance dated dealt death debit debts decay decks decor delay delta dense depth derby devil diary dirty dozen draft drain drama drank drawn dread dream dress dried drift drill drink drive drone drops drove drown drugs drunk dryer dusty dwell dying eager early earth easel eaten eater edges eight elbow elder elect elite email embed empty ender enemy enjoy enter entry equal erase error erupt ethic event every evict exact exams excel exert exile exist extra facts faint fairs fairy faith false fancy fatal fated fault favor feast feels fence ferry fetch fewer fiber field fiery fifth fifty fight final finds finer fired firms first fishy fixed fixer flame flank flare flash flask fleet flesh flick flies fling float flock flood floor flora flour flows fluid flush focus foggy force forge forms forth forty forum found frame frank fraud freed fresh fried frogs front frost fruit re whose wider width wield wife wight wilds wiles wills wilts wimp wince winch winds windy wined wines wings winks winos wiped wiper wipes wired wirer wires wiser wises wisps wispy witch withe witty wives wizen woken wolds wolves woman womb woods woody wooed wools woolly words wordy works world worms wormy worry worse worst worth would wound woven wowed wrack wraps wrath wreak wreck wrens wrest wring wrist write writs wrong wrote wroth wrung wryly yacht yanks yards yarns yawls yawns yawny yeahs yearn years yeast yells yelps yikes yield yodel yoked yokel yokes yolks yolky young yours youth yowls yucky yummy zebra zebus zeros zests zesty zingy zombi zonal zoned zones zooms`;

    const BASE_WORDS = WORD_STRING.split(/\s+/).filter(w => w.length === 5);
    const FRENCH_LOANWORDS = [
      'beret', 'beige', 'cache', 'caper', 'creme', 'debut', 'depot', 'elite',
      'ennui', 'genre', 'matin', 'naive', 'niche', 'queue', 'rappe', 'rouge',
      'satin', 'salon', 'suave', 'valet'
    ];
    const WORDS = [...new Set([...BASE_WORDS, ...FRENCH_LOANWORDS])];
    const FRENCH_SET = new Set(FRENCH_LOANWORDS);

    // ---------- Solver Logic ----------
    function matchesConstraints(word, guesses) {
      for (const { letters, colors } of guesses) {
        if (letters.some(l => !l)) continue;

        for (let i = 0; i < 5; i++) {
          const letter = letters[i].toLowerCase();
          const color = colors[i];
          if (color === 'green' && word[i] !== letter) return false;
          if (color === 'yellow' && word[i] === letter) return false;
          if (color === 'gray' && word[i] === letter) return false;
        }

        const requiredCounts = {};
        for (let i = 0; i < 5; i++) {
          const letter = letters[i].toLowerCase();
          if (colors[i] === 'green' || colors[i] === 'yellow') {
            requiredCounts[letter] = (requiredCounts[letter] || 0) + 1;
          }
        }

        const caps = {};
        for (let i = 0; i < 5; i++) {
          const letter = letters[i].toLowerCase();
          if (colors[i] === 'gray') caps[letter] = requiredCounts[letter] || 0;
        }

        const wordCounts = {};
        for (const c of word) wordCounts[c] = (wordCounts[c] || 0) + 1;

        for (const [l, c] of Object.entries(requiredCounts)) {
          if ((wordCounts[l] || 0) < c) return false;
        }
        for (const [l, cap] of Object.entries(caps)) {
          if ((wordCounts[l] || 0) > cap) return false;
        }
      }
      return true;
    }

    function scoreWord(word, pool) {
      const freq = {};
      const positionFreq = Array.from({ length: 5 }, () => ({}));

      for (const w of pool) {
        const seen = new Set();
        for (let i = 0; i < w.length; i++) {
          const c = w[i];
          positionFreq[i][c] = (positionFreq[i][c] || 0) + 1;
          if (!seen.has(c)) {
            freq[c] = (freq[c] || 0) + 1;
            seen.add(c);
          }
        }
      }

      const seen = new Set();
      let score = 0;
      for (let i = 0; i < word.length; i++) {
        const c = word[i];
        if (!seen.has(c)) {
          score += freq[c] || 0;
          seen.add(c);
        }
        score += (positionFreq[i][c] || 0) * 0.35;
      }

      const uniqueLetters = new Set(word).size;
      score += uniqueLetters * 4;

      if (FRENCH_SET.has(word)) score += 8;

      return score;
    }

    const COLOR_CYCLE = { gray: 'yellow', yellow: 'green', green: 'gray' };

    const tileColor = (color, hasLetter) => {
      if (!hasLetter) return 'bg-stone-50 border-stone-300 text-stone-800';
      if (color === 'green') return 'bg-emerald-700 border-emerald-800 text-stone-50';
      if (color === 'yellow') return 'bg-amber-500 border-amber-600 text-stone-900';
      return 'bg-stone-400 border-stone-500 text-stone-50';
    };

    // ---------- Main Component ----------
    function WordleSolver() {
      const [guesses, setGuesses] = useState(
        Array.from({ length: 6 }, () => ({
          letters: ['', '', '', '', ''],
          colors: ['gray', 'gray', 'gray', 'gray', 'gray'],
        }))
      );
      const [activeRow, setActiveRow] = useState(0);
      const [activeCol, setActiveCol] = useState(0);

      useEffect(() => {
        const handler = (e) => {
          const tag = document.activeElement?.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;

          if (/^[a-zA-Z]$/.test(e.key)) {
            setGuesses((gs) => {
              const copy = gs.map((r) => ({ letters: [...r.letters], colors: [...r.colors] }));
              copy[activeRow].letters[activeCol] = e.key.toUpperCase();
              return copy;
            });
            if (activeCol < 4) setActiveCol(activeCol + 1);
          } else if (e.key === 'Backspace') {
            setGuesses((gs) => {
              const copy = gs.map((r) => ({ letters: [...r.letters], colors: [...r.colors] }));
              if (copy[activeRow].letters[activeCol]) {
                copy[activeRow].letters[activeCol] = '';
              } else if (activeCol > 0) {
                copy[activeRow].letters[activeCol - 1] = '';
                setActiveCol(activeCol - 1);
              }
              return copy;
            });
          } else if (e.key === 'Enter') {
            if (activeRow < 5) { setActiveRow(activeRow + 1); setActiveCol(0); }
          } else if (e.key === 'ArrowLeft' && activeCol > 0) setActiveCol(activeCol - 1);
          else if (e.key === 'ArrowRight' && activeCol < 4) setActiveCol(activeCol + 1);
          else if (e.key === 'ArrowUp' && activeRow > 0) setActiveRow(activeRow - 1);
          else if (e.key === 'ArrowDown' && activeRow < 5) setActiveRow(activeRow + 1);
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [activeRow, activeCol]);

      const cycleColor = (rowIdx, colIdx) => {
        setGuesses((gs) => {
          const copy = gs.map((r) => ({ letters: [...r.letters], colors: [...r.colors] }));
          if (!copy[rowIdx].letters[colIdx]) return copy;
          copy[rowIdx].colors[colIdx] = COLOR_CYCLE[copy[rowIdx].colors[colIdx]];
          return copy;
        });
      };

      const focusTile = (rowIdx, colIdx) => { setActiveRow(rowIdx); setActiveCol(colIdx); };

      const reset = () => {
        setGuesses(Array.from({ length: 6 }, () => ({
          letters: ['', '', '', '', ''],
          colors: ['gray', 'gray', 'gray', 'gray', 'gray'],
        })));
        setActiveRow(0); setActiveCol(0);
      };

      const remaining = useMemo(
        () => WORDS.filter((w) => matchesConstraints(w, guesses)),
        [guesses]
      );

      const suggestions = useMemo(() => {
        if (remaining.length === 0) return [];
        const scored = remaining.map((w) => ({ word: w, score: scoreWord(w, remaining) }));
        scored.sort((a, b) => b.score - a.score);
        return scored.slice(0, 8);
      }, [remaining]);

      const hasAnyInput = guesses.some((r) => r.letters.some((l) => l));

      const today = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      return (
        <div className="min-h-screen bg-stone-100 p-6">
          <div className="max-w-5xl mx-auto">
            {/* Header */}
            <div className="border-b-2 border-stone-800 pb-4 mb-8">
              <div className="flex items-baseline justify-between flex-wrap gap-2">
                <div>
                  <div className="text-xs tracking-[0.3em] text-stone-500 uppercase mb-1">Puzzle Assistant</div>
                  <h1 className="text-5xl font-extrabold text-stone-900 tracking-tight italic">The Solver</h1>
                </div>
                <div className="text-right text-xs tracking-widest text-stone-500 uppercase">{today}</div>
              </div>
            </div>

            <div className="grid md:grid-cols-[auto_1fr] gap-10">
              {/* Left: Grid */}
              <div>
                <div className="inline-block">
                  {guesses.map((row, rowIdx) => (
                    <div key={rowIdx} className="flex gap-2 mb-2">
                      {row.letters.map((letter, colIdx) => {
                        const isActive = rowIdx === activeRow && colIdx === activeCol;
                        const color = row.colors[colIdx];
                        return (
                          <button
                            key={colIdx}
                            onClick={() => {
                              if (isActive && letter) cycleColor(rowIdx, colIdx);
                              else focusTile(rowIdx, colIdx);
                            }}
                            className={`tile-font w-14 h-14 md:w-16 md:h-16 text-2xl md:text-3xl font-extrabold border-2 transition-all duration-150 ${tileColor(color, !!letter)} ${isActive ? 'ring-4 ring-stone-800 ring-offset-2 ring-offset-stone-100' : ''}`}
                          >
                            {letter}
                          </button>
                        );
                      })}
                    </div>
                  ))}
                </div>

                <div className="mt-5 text-xs text-stone-600 max-w-xs leading-relaxed">
                  <div className="flex items-start gap-2 mb-2">
                    <Info size={14} className="mt-0.5 flex-shrink-0" />
                    <span>
                      Type letters to fill tiles. Click the active tile to cycle color:
                      <span className="inline-block w-3 h-3 bg-stone-400 mx-1 align-middle" /> gray →
                      <span className="inline-block w-3 h-3 bg-amber-500 mx-1 align-middle" /> yellow →
                      <span className="inline-block w-3 h-3 bg-emerald-700 mx-1 align-middle" /> green.
                    </span>
                  </div>
                </div>

                <button
                  onClick={reset}
                  className="mt-5 inline-flex items-center gap-2 px-4 py-2 border-2 border-stone-800 text-stone-800 hover:bg-stone-800 hover:text-stone-50 transition-colors text-sm tracking-wider uppercase"
                >
                  <RotateCcw size={14} /> Reset Board
                </button>
              </div>

              {/* Right: Suggestions */}
              <div>
                <div className="border-t-4 border-stone-800 pt-4">
                  <div className="flex items-baseline justify-between mb-4">
                    <h2 className="text-2xl font-bold text-stone-900">Recommended Guesses</h2>
                    <div className="text-xs tracking-widest text-stone-500 uppercase">
                      {remaining.length} {remaining.length === 1 ? 'match' : 'matches'} left
                    </div>
                  </div>

                  {!hasAnyInput && (
                    <div className="bg-stone-50 border border-stone-300 p-6 text-stone-700 leading-relaxed">
                      <Sparkles size={18} className="mb-2 text-amber-600" />
                      <div className="font-semibold mb-1">Start with a strong opener.</div>
                      <div className="text-sm">
                        Words like <span className="tile-font font-bold">CRANE</span>,{' '}
                        <span className="tile-font font-bold">SLATE</span>, or{' '}
                        <span className="tile-font font-bold">CRATE</span> cover high-frequency letters in common positions.
                        French-origin words that are common in English — like{' '}
                        <span className="tile-font font-bold">GENRE</span>,{' '}
                        <span className="tile-font font-bold">ELITE</span>, and{' '}
                        <span className="tile-font font-bold">ROUGE</span> — are also considered in the ranking.
                        Enter your guess above, then tap each tile to mark feedback from the puzzle.
                      </div>
                    </div>
                  )}

                  {hasAnyInput && suggestions.length === 0 && (
                    <div className="bg-red-50 border border-red-300 p-4 text-red-900 text-sm">
                      No matching words found. Double-check the tile colors — a mismatch may have eliminated every candidate.
                    </div>
                  )}

                  {hasAnyInput && suggestions.length > 0 && (
                    <div className="space-y-2">
                      {suggestions.map((s, i) => {
                        const maxScore = suggestions[0].score || 1;
                        const pct = (s.score / maxScore) * 100;
                        return (
                          <div key={s.word} className="flex items-center gap-4 py-2 border-b border-stone-300">
                            <div className="text-stone-400 text-sm w-6 tabular-nums">{String(i + 1).padStart(2, '0')}</div>
                            <div className="tile-font text-xl font-extrabold text-stone-900 w-24 tracking-wider">
                              {s.word.toUpperCase()}
                            </div>
                            <div className="flex-1 h-2 bg-stone-200 relative">
                              <div className="absolute inset-y-0 left-0 bg-emerald-700" style={{ width: `${pct}%` }} />
                            </div>
                            <div className="text-stone-500 text-xs tabular-nums w-10 text-right">{s.score}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {remaining.length > 0 && remaining.length <= 20 && hasAnyInput && (
                    <div className="mt-6 pt-4 border-t border-stone-300">
                      <div className="text-xs tracking-widest text-stone-500 uppercase mb-2">All remaining possibilities</div>
                      <div className="flex flex-wrap gap-2">
                        {remaining.map((w) => (
                          <span key={w} className="tile-font text-sm font-bold text-stone-700 bg-stone-200 px-2 py-1">
                            {w.toUpperCase()}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="mt-16 pt-6 border-t border-stone-300 text-xs text-stone-500 leading-relaxed max-w-2xl">
              <div className="font-bold text-stone-700 mb-1 tracking-wider uppercase">About this tool</div>
              <p>
                Enter your guesses and their feedback from any 5-letter word puzzle. The solver filters a dictionary of
                ~1,400 common English words plus a small set of French-origin loanwords widely used in English,
                and ranks candidates by letter frequency, position frequency, and letter diversity. Matching French loanwords
                receive a light boost so options like GENRE, ELITE, or ROUGE are surfaced when they fit the puzzle. Built as a
                learning exercise in constraint-satisfaction logic.
              </p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WordleSolver />);
  </script>
